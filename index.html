<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บันทึกผลงานกรรมการสงเคราะห์ - ขอนแก่น</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .container-liff { max-width: 600px; margin: auto; padding: 20px; }
        .card-form { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); background: white; }
        .header-title { color: #0d6efd; font-weight: 800; }
        .section-special { display: none; border-left: 4px solid #0d6efd; background-color: #f8f9ff; padding: 15px; border-radius: 0 10px 10px 0; margin-top: 15px; }
        .form-label { font-weight: 600; color: #444; margin-bottom: 8px; }
        .btn-submit { 
            background: linear-gradient(45deg, #0d6efd, #0056b3);
            color: white; border-radius: 12px; padding: 15px; 
            font-weight: bold; width: 100%; border: none; transition: 0.3s;
        }
        .btn-submit:disabled { background: #ccc; }
        .btn-submit:active { transform: scale(0.98); }
        .loading-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.8); z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div class="mt-3 fw-bold">กำลังบันทึกข้อมูลและอัปโหลดรูปภาพ...</div>
</div>

<div class="container-liff">
    <div class="card card-form p-4">
        <div class="text-center mb-4">
            <h4 class="header-title"><i class="bi bi-shield-check"></i> บันทึกผลงานกรรมการสงเคราะห์</h4>
            <p class="text-muted small">สถานพินิจและคุ้มครองเด็กและเยาวชนจังหวัดขอนแก่น</p>
        </div>

        <form id="perfForm" class="row g-3">
            <div class="col-4">
                <label class="form-label">ปี พ.ศ.</label>
                <input type="number" id="year" class="form-control" value="2569" required>
            </div>
            <div class="col-8">
                <label class="form-label">ชื่อ-นามสกุลกรรมการ</label>
                <input type="text" id="volunteerName" class="form-control bg-light" readonly required placeholder="รอโหลดชื่อ...">
            </div>

            <div class="col-12">
                <label class="form-label">ประเภทผลงาน</label>
                <select id="mainType" class="form-select" onchange="updateSubOptions()" required>
                    <option value="">เลือกประเภทหลัก...</option>
                    <option value="ผลงานทั่วไป">ผลงานทั่วไป</option>
                    <option value="ผลงานเฉพาะ">ผลงานเฉพาะ</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">รายการผลงาน</label>
                <select id="subType" class="form-select" onchange="showSpecificSubFields()" required disabled>
                    <option value="">กรุณาเลือกประเภทหลักก่อน...</option>
                </select>
            </div>

            <div id="projectSection" class="col-12 section-special">
                <label class="form-label text-primary">8. ประเภทโครงการ</label>
                <select id="projectType" class="form-select">
                    <option value="พัฒนาพฤตินิสัย">8.1 โครงการพัฒนาพฤตินิสัย</option>
                    <option value="ฝึกวิชาชีพ">8.2 โครงการฝึกวิชาชีพ</option>
                    <option value="พัฒนาบุคลากร">8.3 โครงการพัฒนาบุคลากร</option>
                </select>
            </div>
            <div id="guaranteeSection" class="col-12 section-special">
                <label class="form-label text-success">5. ประเภทการค้ำประกัน</label>
                <select id="guaranteeType" class="form-select">
                    <option value="บริษัท">5.1 ในบริษัท</option>
                    <option value="ห้างหุ้นส่วน">5.2 ในห้างหุ้นส่วนหรืออื่นๆ</option>
                </select>
            </div>
            <div id="halfwaySection" class="col-12 section-special">
                <label class="form-label text-warning">10. รายละเอียดบ้านกึ่งวิถี</label>
                <select id="halfwayType" class="form-select">
                    <option value="จัดตั้ง">10.1 จัดตั้งบ้านกึ่งวิถี</option>
                    <option value="สนับสนุน">10.2 สนับสนุนการดำเนินงาน</option>
                </select>
            </div>

            <div class="col-12">
                <label class="form-label">วันที่จัดกิจกรรม</label>
                <input type="date" id="date" class="form-control" required>
            </div>

            <div class="col-12">
                <label class="form-label">รายละเอียดเพิ่มเติม (คอลัมน์ I)</label>
                <textarea id="details" class="form-control" rows="3" placeholder="พิมพ์สรุปกิจกรรมสั้นๆ..."></textarea>
            </div>

            <div class="col-12">
                <label class="form-label"><i class="bi bi-camera-fill"></i> อัปโหลดรูปภาพ (หลายรูปได้)</label>
                <input type="file" id="fileInput" class="form-control" multiple accept="image/*">
            </div>

            <div class="col-12 mt-4">
                <button type="submit" id="submitBtn" class="btn btn-submit shadow-sm">
                    <i class="bi bi-cloud-check-fill me-2"></i> บันทึกข้อมูลและรูปภาพ
                </button>
            </div>
        </form>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    // 🚩 1. ตั้งค่าพื้นฐาน (เปลี่ยน URL นี้ให้เป็น Web App ของพี่)
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSkZrd80VnNNGlbfFxXwCs9-fy7_pO2JNjepBnv94Afhqaq8KfTwTIv1EJsxcp3NLGFA/exec";
    const LIFF_ID = "2009775169-wgpqbky9";

    // --- 2. LIFF Init ---
    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) {
                liff.login();
            } else {
                const urlParams = new URLSearchParams(window.location.search);
                const vName = urlParams.get('vname');
                if (vName) document.getElementById('volunteerName').value = vName;
            }
        } catch (err) { console.error('LIFF Error', err); }
    }
    initLiff();

    // --- 3. UI Control ---
    function updateSubOptions() {
        const main = document.getElementById('mainType').value;
        const sub = document.getElementById('subType');
        sub.disabled = false;
        sub.innerHTML = '<option value="">เลือกรายการ...</option>';

        const opt = {
            'ผลงานทั่วไป': ['เยี่ยมเด็กและเยาวชน', 'ร่วมประชุม'],
            'ผลงานเฉพาะ': ['จัดหาสถานศึกษา', 'ให้ทุนการศึกษา', 'รับหรือจัดหางาน', 'ให้ทุนประกอบอาชีพ', 'ค้ำประกันทำงาน', 'มีปัญหาพิเศษ', 'พ่อแม่อุปถัมภ์', 'สนับสนุน', 'บ้านกึ่งวิถี', 'โครงการ']
        };

        if (opt[main]) {
            opt[main].forEach(o => {
                let el = document.createElement('option');
                el.value = el.textContent = o;
                sub.appendChild(el);
            });
        }
        showSpecificSubFields();
    }

    function showSpecificSubFields() {
        const sub = document.getElementById('subType').value;
        document.getElementById('projectSection').style.display = (sub === 'โครงการ') ? 'block' : 'none';
        document.getElementById('guaranteeSection').style.display = (sub === 'ค้ำประกันทำงาน') ? 'block' : 'none';
        document.getElementById('halfwaySection').style.display = (sub === 'บ้านกึ่งวิถี') ? 'block' : 'none';
    }

    // --- 4. บันทึกข้อมูล ---
    document.getElementById('perfForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        
        const sub = document.getElementById('subType').value;
        let subDetail = "-";
        if (sub === 'โครงการ') subDetail = document.getElementById('projectType').value;
        else if (sub === 'ค้ำประกันทำงาน') subDetail = document.getElementById('guaranteeType').value;
        else if (sub === 'บ้านกึ่งวิถี') subDetail = document.getElementById('halfwayType').value;

        // ถามยืนยัน
        const confirm = await Swal.fire({
            title: 'ยืนยันการบันทึก?',
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'บันทึกข้อมูล',
            cancelButtonText: 'ตรวจสอบอีกครั้ง'
        });

        if (!confirm.isConfirmed) return;

        // เริ่มโหลด
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('submitBtn').disabled = true;

        // อ่านไฟล์รูปภาพ
        const files = document.getElementById('fileInput').files;
        let fileData = [];
        for (let i = 0; i < files.length; i++) {
            const base64 = await new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = (e) => resolve(e.target.result.split(',')[1]);
                reader.readAsDataURL(files[i]);
            });
            fileData.push({ base64: base64, mimeType: files[i].type, fileName: files[i].name });
        }

        const payload = {
            year: document.getElementById('year').value,
            volunteerName: document.getElementById('volunteerName').value,
            mainType: document.getElementById('mainType').value,
            subType: sub,
            subDetail: subDetail,
            date: document.getElementById('date').value,
            details: document.getElementById('details').value,
            files: fileData
        };

        // ส่งข้อมูลตรงไป GAS (ไม่ผ่าน Webhook LINE)
        try {
            const response = await fetch(WEB_APP_URL, {
                method: 'POST',
                body: JSON.stringify(payload)
            });
            const result = await response.json();

        if (result.success) {
            // 🚩 1. สั่งปิดตัวหมุนก่อนทันที
            document.getElementById('loader').style.display = 'none';
        
            // 🚩 2. แล้วค่อยโชว์แจ้งเตือนสำเร็จ
            await Swal.fire({
                icon: 'success',
                title: 'บันทึกสำเร็จ!',
                text: 'ข้อมูลและรูปภาพถูกเก็บลงระบบแล้ว',
                confirmButtonText: 'ตกลง'
            });
            
            // 🚩 3. ปิดหน้าต่าง LIFF
            liff.closeWindow();
        } else {
            // กรณี Error ก็ต้องปิดตัวหมุนเช่นกัน
            document.getElementById('loader').style.display = 'none';
            Swal.fire('เกิดข้อผิดพลาด', result.message, 'error');
        }
        } catch (err) {
            Swal.fire('เกิดข้อผิดพลาด', err.message, 'error');
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    });
</script>
</body>
</html>
