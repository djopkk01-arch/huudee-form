<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบจัดการผลงานกรรมการสงเคราะห์ - สถานพินิจฯ ขอนแก่น</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background-color: #f0f2f5; font-family: 'Segoe UI', Tahoma, sans-serif; }
        .container-liff { max-width: 600px; margin: auto; padding: 20px; }
        .card-custom { border-radius: 20px; border: none; box-shadow: 0 10px 25px rgba(0,0,0,0.08); background: white; margin-bottom: 20px; overflow: hidden; }
        .header-title { color: #0d6efd; font-weight: 800; }
        
        /* Dashboard สไตล์ */
        .score-box { background: linear-gradient(45deg, #0d6efd, #0056b3); color: white; border-radius: 15px; padding: 25px; text-align: center; }
        .progress { height: 12px; border-radius: 10px; margin: 15px 0; background-color: rgba(255,255,255,0.2); }
        .section-special { display: none; border-left: 4px solid #0d6efd; background-color: #f8f9ff; padding: 15px; border-radius: 0 10px 10px 0; margin-top: 15px; }
        
        .btn-submit { 
            background: linear-gradient(45deg, #0d6efd, #0056b3);
            color: white; border-radius: 12px; padding: 15px; 
            font-weight: bold; width: 100%; border: none; transition: 0.3s;
        }
        .btn-submit:disabled { opacity: 0.7; cursor: not-allowed; }
        .loading-overlay { display: flex; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; justify-content: center; align-items: center; flex-direction: column; }
        
        /* File Badge สไตล์ */
        .file-badge { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 10px; padding: 8px 12px; display: flex; align-items: center; font-size: 0.85rem; }
    </style>
</head>
<body>

<div id="loader" class="loading-overlay">
    <div class="spinner-border text-primary" role="status"></div>
    <div id="loaderText" class="mt-3 fw-bold">กำลังตรวจสอบสิทธิ์การใช้งาน...</div>
</div>

<div class="container-liff">

    <div id="volunteerDashboard" style="display: none;">
        <div class="card card-custom p-4">
            <div class="text-center mb-4">
                <h4 class="header-title"><i class="bi bi-person-badge"></i> สรุปคะแนนสะสมของท่าน</h4>
                <p id="volunteerDisplayName" class="text-primary fw-bold mb-0"></p>
            </div>
            <div class="score-box">
                <div class="small opacity-75">คะแนนสะสมรอบปีปัจจุบัน</div>
                <h1 id="kpiScore" class="my-2">0 / 12</h1>
                <div class="progress">
                    <div id="scoreBar" class="progress-bar bg-warning" style="width: 0%"></div>
                </div>
                <div id="starRating" class="text-warning fs-4"></div>
                <div class="small mt-2 opacity-75">* สะสมครบ 12 คะแนนเพื่อผ่านเกณฑ์ประจำปี</div>
            </div>
        </div>

        <div class="card card-custom p-4">
            <h5 class="mb-3 fw-bold"><i class="bi bi-clock-history"></i> ประวัติการปฏิบัติงาน (ครั้ง)</h5>
            <div class="table-responsive">
                <table class="table table-hover align-middle">
                    <thead class="table-light small">
                        <tr>
                            <th class="text-start">รายการผลงาน</th>
                            <th class="text-center">จำนวนครั้ง</th>
                        </tr>
                    </thead>
                    <tbody id="summaryTableBody" class="small"></tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="staffSection" style="display: none;">
        <div class="card card-custom p-4">
            <div class="text-center mb-4">
                <h4 class="header-title"><i class="bi bi-pencil-square"></i> บันทึกผลงานใหม่</h4>
                <p class="text-muted small">ระบบสำหรับเจ้าหน้าที่สถานพินิจฯ ขอนแก่น</p>
            </div>
            
            <form id="perfForm" class="row g-3">
                <div class="col-4">
                    <label class="form-label small">ปี พ.ศ.</label>
                    <input type="number" id="year" class="form-control" value="2569" required>
                </div>
                <div class="col-8">
                    <label class="form-label small">ชื่อ-นามสกุลกรรมการ</label>
                    <input type="text" id="volunteerName" class="form-control" required placeholder="พิมพ์ชื่อเพื่อค้นหา...">
                </div>

                <div class="col-12">
                    <label class="form-label small">ประเภทผลงาน</label>
                    <select id="mainType" class="form-select" onchange="updateSubOptions()" required>
                        <option value="">เลือกประเภทหลัก...</option>
                        <option value="ผลงานทั่วไป">ผลงานทั่วไป</option>
                        <option value="ผลงานเฉพาะ">ผลงานเฉพาะ</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label small">รายการผลงาน</label>
                    <select id="subType" class="form-select" onchange="showSpecificSubFields()" required disabled>
                        <option value="">กรุณาเลือกประเภทหลักก่อน...</option>
                    </select>
                </div>

                <div id="projectSection" class="col-12 section-special">
                    <label class="form-label text-primary small">8. ประเภทโครงการ</label>
                    <select id="projectType" class="form-select">
                        <option value="พัฒนาพฤตินิสัย">8.1 โครงการพัฒนาพฤตินิสัย</option>
                        <option value="ฝึกวิชาชีพ">8.2 โครงการฝึกวิชาชีพ</option>
                        <option value="พัฒนาบุคลากร">8.3 โครงการพัฒนาบุคลากร</option>
                    </select>
                </div>
                <div id="guaranteeSection" class="col-12 section-special">
                    <label class="form-label text-success small">5. ประเภทการค้ำประกัน</label>
                    <select id="guaranteeType" class="form-select">
                        <option value="บริษัท">5.1 ในบริษัท</option>
                        <option value="ห้างหุ้นส่วน">5.2 ในห้างหุ้นส่วนหรืออื่นๆ</option>
                    </select>
                </div>
                <div id="halfwaySection" class="col-12 section-special">
                    <label class="form-label text-warning small">10. รายละเอียดบ้านกึ่งวิถี</label>
                    <select id="halfwayType" class="form-select">
                        <option value="จัดตั้ง">10.1 จัดตั้งบ้านกึ่งวิถี</option>
                        <option value="สนับสนุน">10.2 สนับสนุนการดำเนินงาน</option>
                    </select>
                </div>

                <div class="col-12">
                    <label class="form-label small">วันที่จัดกิจกรรม</label>
                    <input type="date" id="date" class="form-control" required>
                </div>

                <div class="col-12">
                    <label class="form-label small">รายละเอียดเพิ่มเติม</label>
                    <textarea id="details" class="form-control" rows="2" placeholder="พิมพ์สรุปสั้นๆ..."></textarea>
                </div>

                <div class="col-12">
                    <label class="form-label small"><i class="bi bi-camera-fill"></i> อัปโหลดรูปภาพ หรือไฟล์ PDF (เลือกเพิ่มได้เรื่อยๆ)</label>
                    <input type="file" id="fileInput" class="form-control" multiple accept="image/*,application/pdf">
                    <div id="fileListContainer" class="mt-2 d-flex flex-wrap gap-2"></div>
                </div>

                <div class="col-12 mt-4">
                    <button type="submit" id="submitBtn" class="btn btn-submit shadow-sm">
                        <i class="bi bi-cloud-arrow-up-fill me-2"></i> บันทึกข้อมูลและรูปภาพ
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzSkZrd80VnNNGlbfFxXwCs9-fy7_pO2JNjepBnv94Afhqaq8KfTwTIv1EJsxcp3NLGFA/exec";
    const LIFF_ID = "2009775169-wgpqbky9";
    let currentUser = null;
    let selectedFiles = []; 

    window.onload = function() {
        liff.init({ liffId: LIFF_ID })
            .then(() => {
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const context = liff.getContext();
                    if (context && context.userId) {
                        checkUserRole(context.userId);
                    } else {
                        liff.getProfile().then(p => checkUserRole(p.userId));
                    }
                }
            })
            .catch(err => {
                console.error(err);
                document.getElementById('loaderText').innerText = "LIFF Error: " + err;
            });
    };

    async function checkUserRole(lineId) {
        try {
            const url = `${WEB_APP_URL}?action=getVolunteerByLine&userId=${lineId}`;
            const response = await fetch(url, { redirect: 'follow' });
            const data = await response.json();
            document.getElementById('loader').style.display = 'none';

            if (data && data.exists) {
                currentUser = data;
                const role = (data.role || "").toLowerCase();
                const isStaff = data.isAdminOrStaff === true || role.includes("admin") || role.includes("เจ้าหน้าที่สถานพินิจ");
                const urlParams = new URLSearchParams(window.location.search);
                const vName = urlParams.get('vname');

                if (isStaff) {
                    if (vName) {
                        document.getElementById('staffSection').style.display = 'block';
                        document.getElementById('volunteerName').value = vName;
                    } else {
                        Swal.fire('เข้าถึงไม่ถูกต้อง', 'กรุณาค้นหาชื่อกรรมการจากแชทบอทเพื่อบันทึกงานครับ', 'warning').then(() => liff.closeWindow());
                    }
                } else {
                    document.getElementById('volunteerDashboard').style.display = 'block';
                    document.getElementById('volunteerDisplayName').innerText = `สวัสดีคุณ ${data.fullname}`;
                    loadDashboardData(data.fullname);
                }
            } else {
                Swal.fire('ไม่พบข้อมูล', 'กรุณายืนยันตัวตนใน LINE ก่อนใช้งานครับ', 'warning').then(() => liff.closeWindow());
            }
        } catch (err) {
            Swal.fire('Error', 'ไม่สามารถเชื่อมต่อระบบได้', 'error');
        }
    }

    // --- ฟังก์ชันย่อขนาดรูปภาพ (สำคัญ: แก้ปัญหาเครื่องค้าง) ---
    async function compressImage(file) {
        return new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 1200; 
                    let width = img.width;
                    let height = img.height;
                    if (width > MAX_WIDTH) {
                        height *= MAX_WIDTH / width;
                        width = MAX_WIDTH;
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7).split(',')[1]);
                };
            };
        });
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const newFiles = Array.from(e.target.files);
        selectedFiles = selectedFiles.concat(newFiles);
        renderFileList();
        this.value = ""; 
    });

    function renderFileList() {
        const container = document.getElementById('fileListContainer');
        container.innerHTML = "";
        selectedFiles.forEach((file, index) => {
            const div = document.createElement('div');
            div.className = "file-badge shadow-sm";
            div.innerHTML = `
                <i class="bi ${file.type.startsWith('image/') ? 'bi-image' : 'bi-file-pdf'} me-2 text-primary"></i>
                <span class="text-truncate" style="max-width: 150px;">${file.name}</span>
                <i class="bi bi-x-circle-fill ms-2 text-danger" style="cursor:pointer" onclick="removeFile(${index})"></i>
            `;
            container.appendChild(div);
        });
    }

    function removeFile(index) {
        selectedFiles.splice(index, 1);
        renderFileList();
    }

    document.getElementById('perfForm').addEventListener('submit', async function(e) {
        e.preventDefault();
        const volunteer = document.getElementById('volunteerName').value;
        const confirm = await Swal.fire({
            title: 'ยืนยันการบันทึก?',
            text: `กรรมการ: ${volunteer}`,
            icon: 'question',
            showCancelButton: true,
            confirmButtonText: 'บันทึกข้อมูล'
        });
        if (!confirm.isConfirmed) return;

        document.getElementById('loaderText').innerText = "กำลังย่อขนาดรูปภาพและส่งข้อมูล...";
        document.getElementById('loader').style.display = 'flex';
        document.getElementById('submitBtn').disabled = true;

        let fileData = [];
        for (let file of selectedFiles) {
            let base64;
            if (file.type.startsWith('image/')) {
                base64 = await compressImage(file);
            } else {
                base64 = await new Promise(res => {
                    const r = new FileReader();
                    r.onload = (ev) => res(ev.target.result.split(',')[1]);
                    r.readAsDataURL(file);
                });
            }
            fileData.push({ base64: base64, mimeType: file.type, fileName: file.name });
        }

        const payload = {
            userId: liff.getContext().userId,
            year: document.getElementById('year').value,
            volunteerName: volunteer,
            mainType: document.getElementById('mainType').value,
            subType: document.getElementById('subType').value,
            subDetail: (function() {
                const s = document.getElementById('subType').value;
                if (s === 'โครงการ') return document.getElementById('projectType').value;
                if (s === 'ค้ำประกันทำงาน') return document.getElementById('guaranteeType').value;
                if (s === 'บ้านกึ่งวิถี') return document.getElementById('halfwayType').value;
                return "-";
            })(),
            date: document.getElementById('date').value,
            details: document.getElementById('details').value,
            files: fileData
        };

        try {
            const res = await fetch(WEB_APP_URL, { method: 'POST', body: JSON.stringify(payload) });
            const result = await res.json();
            if (result.success) {
                try {
                    await liff.sendMessages([{"type": "text", "text": `✅ บันทึกสำเร็จ\nกรรมการ: ${payload.volunteerName}\nรายการ: ${payload.subType}`}]);
                } catch(e) {}
                await Swal.fire('สำเร็จ', 'บันทึกข้อมูลเรียบร้อยแล้ว', 'success');
                liff.closeWindow();
            } else {
                Swal.fire('ล้มเหลว', result.message, 'error');
            }
        } catch (err) {
            Swal.fire('บันทึกข้อมูลเรียบร้อย', 'ข้อมูลเข้าสู่ระบบแล้ว (Network อาจล่าช้าเล็กน้อย)', 'success').then(() => liff.closeWindow());
        } finally {
            document.getElementById('loader').style.display = 'none';
            document.getElementById('submitBtn').disabled = false;
        }
    });

    function updateSubOptions() {
        const main = document.getElementById('mainType').value;
        const sub = document.getElementById('subType');
        sub.disabled = false;
        sub.innerHTML = '<option value="">เลือกรายการ...</option>';
        const opt = {
            'ผลงานทั่วไป': ['เยี่ยมเด็กและเยาวชน', 'ร่วมประชุม'],
            'ผลงานเฉพาะ': ['จัดหาสถานศึกษา', 'ให้ทุนการศึกษา', 'รับหรือจัดหางาน', 'ให้ทุนประกอบอาชีพ', 'ค้ำประกันทำงาน', 'มีปัญหาพิเศษ', 'พ่อแม่อุปถัมภ์', 'สนับสนุน', 'บ้านกึ่งวิถี', 'โครงการ']
        };
        if (opt[main]) {
            opt[main].forEach(o => {
                let el = document.createElement('option');
                el.value = el.textContent = o;
                sub.appendChild(el);
            });
        }
        showSpecificSubFields();
    }

    function showSpecificSubFields() {
        const s = document.getElementById('subType').value;
        document.getElementById('projectSection').style.display = (s === 'โครงการ') ? 'block' : 'none';
        document.getElementById('guaranteeSection').style.display = (s === 'ค้ำประกันทำงาน') ? 'block' : 'none';
        document.getElementById('halfwaySection').style.display = (s === 'บ้านกึ่งวิถี') ? 'block' : 'none';
    }

    async function loadDashboardData(name) {
        const year = document.getElementById('year').value;
        try {
            const res = await fetch(`${WEB_APP_URL}?action=getSummary&name=${name}&year=${year}`);
            const data = await res.json();
            if (data.success) {
                const kpi = data.kpiScore || 0;
                document.getElementById('kpiScore').innerText = `${kpi} / 12`;
                document.getElementById('scoreBar').style.width = `${Math.min((kpi/12)*100, 100)}%`;
                let stars = '';
                let starCount = Math.min(Math.floor(kpi / 2.4), 5);
                for(let i=0; i<5; i++) stars += i < starCount ? '<i class="bi bi-star-fill mx-1"></i>' : '<i class="bi bi-star mx-1 opacity-25"></i>';
                document.getElementById('starRating').innerHTML = stars;
                let tableHtml = '';
                data.summaryData.forEach(item => {
                    tableHtml += `<tr><td class="text-start">${item.label}</td><td class="text-center fw-bold text-primary">${item.count}</td></tr>`;
                });
                document.getElementById('summaryTableBody').innerHTML = tableHtml || '<tr><td colspan="2">ไม่พบประวัติผลงานในปีนี้</td></tr>';
            }
        } catch (e) { console.error(e); }
    }
</script>
</body>
</html>
